<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0C0B0A" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Page not found — PressZero</title>
  <style>
    :root { color-scheme: dark; font-family: ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #0c0b0a; color: #f3eee4; }
    main { width: min(560px, calc(100% - 40px)); text-align: center; }
    img { width: 64px; height: 64px; margin: 0 auto 24px; }
    h1 { font-size: clamp(32px, 7vw, 52px); line-height: 1; letter-spacing: -0.04em; }
    p { color: #aba59b; font-size: 18px; line-height: 1.6; }
    a { display: inline-block; margin-top: 12px; border-radius: 999px; padding: 13px 22px; background: #34e08a; color: #07210f; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <img src="/favicon.svg" alt="PressZero" />
    <h1>That page pressed the wrong zero.</h1>
    <p>The address may have moved, or it may not exist yet.</p>
    <a href="/">Back to PressZero</a>
  </main>
</body>
</html>
