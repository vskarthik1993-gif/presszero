<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0C0B0A" />
  <meta name="robots" content="noindex" />
  <title>PressZero Demo — Leela Voice Receptionist</title>
  <link rel="icon" href="/assets/presszero-mascot.png" type="image/png" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0b0a;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .shell {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }
    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #aba59b;
      font-size: 14px;
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: opacity 0.35s ease;
      z-index: 1;
    }
    .loader.hidden { opacity: 0; }
    iframe {
      flex: 1 1 auto;
      width: 100%;
      border: 0;
      display: block;
      background: #0c0b0a;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="loader" id="loader">Loading PressZero demo…</div>
    <iframe
      id="frame"
      src="https://leela.161-118-187-170.sslip.io/demo"
      title="PressZero voice receptionist demo"
      allow="microphone; camera; autoplay; clipboard-write; fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
  <script>
    var frame = document.getElementById("frame");
    var loader = document.getElementById("loader");
    frame.addEventListener("load", function () {
      loader.classList.add("hidden");
    });
  </script>
</body>
</html>
